services:
  app:
    build: .
    container_name: cadastral-check-service-app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: cadastral-check-service-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cadastral_check_service"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
