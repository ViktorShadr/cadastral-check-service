services:
  app:
    build: .
    container_name: cadastral-check-service-app
    env_file:
      - .env
    environment:
      EXTERNAL_SERVICE_URL: http://external-service:8001
      EXTERNAL_SERVICE_TIMEOUT: ${EXTERNAL_SERVICE_TIMEOUT:-2.0}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      external-service:
        condition: service_started

  external-service:
    build: .
    container_name: cadastral-check-service-external-service
    command: uvicorn external_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "${EXTERNAL_SERVICE_PORT:-8002}:8001"

  db:
    image: postgres:16-alpine
    container_name: cadastral-check-service-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
